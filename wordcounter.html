<!DOCTYPE html>
<html>
<head>
    <title>Word Counter - ToolMaster Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;color:white}
        .c{max-width:800px;margin:0 auto;background:rgba(0,0,0,.4);padding:25px;border-radius:20px}
        h1{text-align:center;margin-bottom:15px}
        textarea{width:100%;height:300px;padding:15px;border:none;border-radius:10px;font-size:16px;background:rgba(0,0,0,.5);color:white;resize:vertical}
        .s{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-top:15px}
        .b{background:rgba(255,255,255,.1);padding:15px;border-radius:10px;text-align:center}
        .n{font-size:2em;font-weight:bold}
        a{color:#ffaa33;text-decoration:none;display:block;text-align:center;margin-bottom:15px}
    </style>
</head>
<body>
    <div class="c">
        <h1>📝 Word Counter</h1>
        <a href="index.html">← Back to Home</a>
        <textarea id="t" placeholder="Type or paste text here..." oninput="u()"></textarea>
        <div class="s">
            <div class="b"><div class="n" id="w">0</div><div>Words</div></div>
            <div class="b"><div class="n" id="c">0</div><div>Characters</div></div>
            <div class="b"><div class="n" id="s">0</div><div>Sentences</div></div>
            <div class="b"><div class="n" id="p">0</div><div>Paragraphs</div></div>
        </div>
    </div>
    <script>
        function u(){let t=document.getElementById('t').value;
        document.getElementById('c').textContent=t.length;
        document.getElementById('w').textContent=t.trim()===''?0:t.trim().split(/\s+/).length;
        document.getElementById('s').textContent=t.split(/[.!?]+/).filter(s=>s.trim()).length;
        document.getElementById('p').textContent=t.split(/\n\n+/).filter(p=>p.trim()).length}
    </script>
</body>
</html>
