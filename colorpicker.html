<!DOCTYPE html>
<html>
<head>
    <title>Color Picker - ToolMaster Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;color:white}
        .c{max-width:500px;margin:0 auto;background:rgba(0,0,0,.4);padding:25px;border-radius:20px}
        h1{text-align:center;margin-bottom:15px}
        #p{width:100%;height:150px;border-radius:15px;margin-bottom:20px}
        input[type=color]{width:100%;height:60px;border:none;border-radius:10px;cursor:pointer}
        .v{background:rgba(255,255,255,.1);padding:15px;border-radius:10px;margin:10px 0;display:flex;justify-content:space-between;align-items:center}
        button{background:#ff9500;color:white;border:none;padding:8px 15px;border-radius:5px;cursor:pointer}
        a{color:#ffaa33;text-decoration:none;display:block;text-align:center;margin-bottom:15px}
    </style>
</head>
<body>
    <div class="c">
        <h1>🎨 Color Picker</h1>
        <a href="index.html">← Back to Home</a>
        <div id="p"></div>
        <input type="color" id="c" value="#667eea" oninput="u()">
        <div class="v"><span>HEX: <b id="h">#667eea</b></span><button onclick="copy('h')">Copy</button></div>
        <div class="v"><span>RGB: <b id="r">rgb(102,126,234)</b></span><button onclick="copy('r')">Copy</button></div>
    </div>
    <script>
        function u(){let c=document.getElementById('c').value;
        document.getElementById('p').style.background=c;
        document.getElementById('h').textContent=c;
        let r=parseInt(c.substr(1,2),16),g=parseInt(c.substr(3,2),16),b=parseInt(c.substr(5,2),16);
        document.getElementById('r').textContent=`rgb(${r},${g},${b})`}
        function copy(id){navigator.clipboard.writeText(document.getElementById(id).textContent);alert('Copied!')}
        u()
    </script>
</body>
</html>
