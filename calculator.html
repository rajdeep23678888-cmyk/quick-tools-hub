<!DOCTYPE html>
<html>
<head>
    <title>Calculator - ToolMaster Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .c{background:rgba(0,0,0,.4);padding:25px;border-radius:20px;width:100%;max-width:350px}
        h1{color:white;text-align:center;margin-bottom:15px}
        #d{width:100%;height:70px;font-size:2em;text-align:right;margin-bottom:15px;padding:15px;border:none;background:rgba(0,0,0,.5);color:white;border-radius:10px}
        .b{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
        button{padding:20px;font-size:1.2em;border:none;border-radius:10px;cursor:pointer;background:rgba(255,255,255,.1);color:white}
        button:active{transform:scale(.95)}
        .o{background:#ff9500}.e{background:#34c759;grid-row:span 2}.r{background:#ff3b30}
        a{color:#ffaa33;text-decoration:none;display:block;text-align:center;margin-bottom:15px}
        footer{text-align:center;margin-top:15px;color:white;opacity:.8}
    </style>
</head>
<body>
    <div class="c">
        <h1>🧮 Calculator</h1>
        <a href="index.html">← Back to Home</a>
        <input id="d" disabled>
        <div class="b">
            <button onclick="c()" class="r">C</button>
            <button onclick="a('/')" class="o">÷</button>
            <button onclick="a('*')" class="o">×</button>
            <button onclick="x()">⌫</button>
            <button onclick="a('7')">7</button>
            <button onclick="a('8')">8</button>
            <button onclick="a('9')">9</button>
            <button onclick="a('-')" class="o">−</button>
            <button onclick="a('4')">4</button>
            <button onclick="a('5')">5</button>
