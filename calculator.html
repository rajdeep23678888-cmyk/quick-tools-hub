<!DOCTYPE html>
<html>
<head>
    <title>Calculator - ToolMaster Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;color:white}
        .c{max-width:400px;width:100%;background:rgba(0,0,0,.4);padding:25px;border-radius:20px}
        h1{text-align:center;margin-bottom:15px}
        #d{width:100%;height:70px;background:rgba(0,0,0,.6);border:none;border-radius:10px;margin-bottom:15px;color:white;font-size:2em;text-align:right;padding:0 15px}
        .g{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
        button{padding:20px;border:none;border-radius:10px;font-size:1.2em;cursor:pointer;background:rgba(255,255,255,.1);color:white}
        button:hover{background:rgba(255,255,255,.2)}
        .o{background:#ff9500}.e{background:#34c759}.c1{background:#ff3b30}
        a{color:#ffaa33;text-decoration:none;display:block;text-align:center;margin-bottom:15px}
    </style>
</head>
<body>
    <div class="c">
        <h1>🧮 Calculator</h1>
        <a href="index.html">← Back to Home</a>
        <input id="d" readonly>
        <div class="g">
            <button class="c1" onclick="cl()">C</button>
            <button class="o" onclick="a('÷')">÷</button>
            <button class="o" onclick="a('×')">×</button>
            <button class="o" onclick="b()">⌫</button>
            <button onclick="a('7')">7</button>
            <button onclick="a('8')">8</button>
            <button onclick="a('9')">9</button>
            <button class="o" onclick="a('-')">-</button>
            <button onclick="a('4')">4</button>
            <button onclick="a('5')">5</button>
            <button onclick="a('6')">6</button>
            <button class="o" onclick="a('+')">+</button>
            <button onclick="a('1')">1</button>
            <button onclick="a('2')">2</button>
            <button onclick="a('3')">3</button>
            <button class="e" onclick="calc()" style="grid-row:span 2">=</button>
            <button onclick="a('0')" style="grid-column:span 2">0</button>
            <button onclick="a('.')">.</button>
        </div>
    </div>
    <script>
        let d=document.getElementById('d');
        function a(v){d.value+=v}
        function cl(){d.value=''}
        function b(){d.value=d.value.slice(0,-1)}
        function calc(){
            try{
                let e=d.value.replace(/×/g,'*').replace(/÷/g,'/');
                d.value=eval(e)
            }catch{d.value='Error'}
        }
    </script>
</body>
</html>
